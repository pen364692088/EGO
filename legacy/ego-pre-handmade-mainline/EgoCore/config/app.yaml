# OpenEmotion Agent Runtime - Application Configuration

app:
  name: openemotion-agent-runtime
  version: "0.1.0"
  environment: development  # development, staging, production

paths:
  data_dir: ./data
  checkpoint_dir: ./data/checkpoints
  memory_dir: ./data/memory
  events_dir: ./data/events
  reports_dir: ./data/reports

logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_enabled: true
  file_path: ./data/logs/app.log
  max_file_size_mb: 10
  backup_count: 5
  console_enabled: true

runtime:
  default_task_timeout: 300  # seconds
  max_retries: 3
  checkpoint_interval: 60  # seconds
  max_concurrent_tasks: 5

# OpenEmotion Integration Configuration
openemotion:
  enabled: true  # Enable Proto-Self Kernel
  mode: embedded
  host: 127.0.0.1
  port: 18080
  auto_start: true
  healthcheck_timeout_ms: 1000
  plan_timeout_ms: 1500
  event_timeout_ms: 800
  inject_plan_into_reply: false  # Phase 2: Only affects reply text
  mirror_events: true
  strict_required: false  # If true, EgoCore fails when OpenEmotion unavailable
  restart_on_failure: true
  max_restart_attempts: 3
  restart_delay_seconds: 5
