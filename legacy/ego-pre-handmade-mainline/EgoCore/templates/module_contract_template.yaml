# Module Contract Template
# 复制此文件，重命名为 {module_name}_contract.yaml，然后逐项填写

metadata:
  name: ""                    # 模块名称，小写下划线分隔
  version: "0.1.0"           # 初始版本
  created_at: ""             # 创建日期 YYYY-MM-DD
  owner: ""                  # 负责人
  status: "draft"            # draft | review | frozen | deprecated

responsibility:
  description: ""            # 一句话描述模块职责
  problem_solved: ""         # 解决什么真实问题
  why_needed: ""             # 为什么需要这个模块

caller:
  primary: ""                # 主调用方
  secondary: []              # 次要调用方列表

trigger:
  condition: ""              # 触发条件
  frequency: ""              # 触发频率: per_message | per_session | per_task | on_demand
  priority: "normal"         # critical | high | normal | low

input:
  schema:
    type: "object"
    required: []             # 必填字段列表
    properties: {}           # 字段定义，见示例
  example: {}                # 有效输入示例
  validation_rules: []       # 额外验证规则

output:
  schema:
    type: "object"
    required: []             # 必填字段列表
    properties: {}           # 字段定义
  example: {}                # 有效输出示例
  empty_behavior: ""         # 空结果如何处理

error:
  schema:
    type: "object"
    required: ["code", "message"]
    properties:
      code:
        type: "string"
        enum: []             # 错误码列表
      message:
        type: "string"
      details:
        type: "object"
  error_codes:               # 错误码定义
    - code: ""
      description: ""
      severity: "warning"    # warning | error | critical
      user_visible: false    # 用户是否可见

fallback:
  enabled: true              # 是否启用 fallback
  behavior: ""               # fallback 行为描述
  default_value: null        # fallback 返回值
  notify_user: false         # 是否通知用户
  log_level: "warning"       # debug | info | warning | error

timeout:
  default_ms: 5000           # 默认超时毫秒
  max_ms: 30000              # 最大超时毫秒
  graceful_degradation: true # 超时是否优雅降级

non_goals:
  - ""                       # 明确不做什么
  - ""

dependencies:
  required: []               # 必需依赖列表
  optional: []               # 可选依赖列表

integration:
  point: ""                  # 接入主链的位置
  feature_flag: ""           # 功能开关名称
  rollout_strategy: ""       # 灰度策略
  rollback_plan: ""          # 回滚方案

observability:
  metrics:                   # 需要采集的指标
    - name: ""
      type: "counter"        # counter | gauge | histogram
      description: ""
  logs:
    level: "info"            # debug | info | warning | error
    sample_rate: 1.0         # 采样率 0.0-1.0
  traces:
    enabled: false           # 是否启用 tracing

