name: Emotiond Evaluation

on:
  pull_request:
    branches: [main, feature-emotiond-mvp]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e .
          pip install requests
      
      - name: Start emotiond
        run: |
          . .venv/bin/activate
          python -m emotiond.main &
          sleep 5
      
      - name: Run evaluation
        run: |
          . .venv/bin/activate
          python tools/run_evaluation.py --output evaluation.json
      
      - name: Generate report
        run: |
          . .venv/bin/activate
          python tools/generate_report.py evaluation.json > evaluation_report.md
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: |
            evaluation.json
            evaluation_report.md
