name: Testbot E2E (Shadow)

on:
  pull_request:
    branches:
      - main
      - 'feature-*'
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:

jobs:
  testbot-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true  # Shadow mode - don't block PRs

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Testbot E2E (PR subset)
        run: |
          python scripts/run_testbot_scenarios.py --subset pr --output artifacts/testbot/pr_summary.json

      - name: Upload PR artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbot-pr-artifacts
          path: artifacts/testbot/
          retention-days: 7

      - name: Comment on PR for ERROR gates
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'artifacts/testbot/pr_summary.json';
            
            if (!fs.existsSync(path)) {
              console.log('No summary file found');
              return;
            }
            
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            const gates = summary.gates || [];
            const errors = gates.filter(g => g.status === 'ERROR');
            
            if (errors.length === 0) {
              console.log('No ERROR gates found (WARN does not trigger comment)');
              return;
            }
            
            const body = `## 🔴 Testbot E2E Shadow Check Failed\n\n` +
              `**This is a shadow check and does not block merge.**\n\n` +
              `### Failed Gates\n\n` +
              errors.map(g => 
                `- **${g.name}**: ${g.message || 'Threshold exceeded'}\n` +
                  `  - Observed: \`${g.observed}\`\n` +
                  `  - Threshold: \`${g.threshold}\``
              ).join('\n\n') +
              `\n\n---\n*View full results in [workflow artifacts](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  testbot-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Testbot E2E (Full suite)
        run: |
          python scripts/run_testbot_scenarios.py --output artifacts/testbot/nightly_summary.json

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbot-nightly-artifacts
          path: artifacts/testbot/
          retention-days: 30
