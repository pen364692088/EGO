version: MVP12
title: Developmental Core Sandbox
goal: >
  Establish a developmental core that generates internal candidates and
  long-run developmental traces inside a governed sandbox without taking
  reply or execution authority.
primary_evidence_source:
  type: runtime_mainline
  ingress_path:
    - RuntimeV2Loop.run_turn_typed
    - app.telegram_runtime_bridge.inspect_ingress_semantic
    - app.telegram_runtime_bridge.build_ingress_context
  direct_real_definition: >
    Any non-mock, non-bypass sample that traverses the formal runtime
    ingress/egress mainline and leaves a complete observation_record_v1.
supplemental_transport_evidence:
  - telegram
transport_specific_claims_require_telegram:
  - slash_commands
  - outbox_delivery
  - session_envelope
  - transport_dedupe
formal_runtime_owner:
  - EgoCore/app/runtime_v2
  - EgoCore/app/runtime_v2/proto_self_runtime.py
  - EgoCore/app/openemotion_adapter/proto_self_adapter.py
  - OpenEmotion/openemotion/proto_self_v2
implementation_library:
  - OpenEmotion/emotiond/developmental_core
compat_reference_only:
  - OpenEmotion/emotiond/daemon.py
  - OpenEmotion/emotiond/developmental
  - EgoCore/app/openemotion_adapter/developmental_writeback.py
in_scope:
  - controlled_developmental_tick_runtime
  - developmental_shadow_writeback
  - candidate_pool_generation
  - background_thought_candidate_generation
  - host_side_initiative_arbiter
  - controlled_proactive_followup_draft
  - controlled_idle_scheduler
  - pending_proactive_followup_state
  - controlled_proactive_delivery_lane
  - host_proactive_outbox_lane
  - controlled_outbox_drain
  - controlled_telegram_transport_bridge
  - feature_flagged_host_governed_proactive_telegram_auto_cycle
  - host_governed_proactive_telegram_enable_policy
  - developmental_trace_capture
  - replay_consistency
  - sandbox_governance
out_of_scope:
  - direct_reply_authority
  - live_idle_scheduler
  - autonomous_unsolicited_transport_delivery
  - response_plan_injection
  - persistent_self_model
  - endogenous_drives
  - reflective_counterfactual_self
  - promotion_to_formal_proto_self
required_artifacts:
  - artifacts/mvp12/developmental_cycles.json
  - artifacts/mvp12/developmental_cycles.jsonl
  - artifacts/mvp12/candidate_pool.json
  - artifacts/mvp12/shadow_state.json
  - artifacts/mvp12/replay_consistency_report.json
  - artifacts/mvp12/gate_checklist.md
  - artifacts/mvp12/runtime_harness_observation_current.jsonl
  - artifacts/mvp12/runtime_harness_observation_current.json
  - artifacts/mvp12/controlled_observation_report.json
  - artifacts/mvp12/controlled_observation_report.md
  - artifacts/mvp12/observation_index.jsonl
  - artifacts/mvp12/controlled_observation_aggregate_current.json
  - artifacts/mvp12/controlled_observation_aggregate_current.md
  - artifacts/mvp12/proactive_followup_current.json
  - artifacts/mvp12/proactive_followup_current.md
  - artifacts/mvp12/idle_scheduler_current.json
  - artifacts/mvp12/idle_scheduler_current.md
  - artifacts/mvp12/controlled_proactive_delivery_current.json
  - artifacts/mvp12/controlled_proactive_delivery_current.md
  - artifacts/mvp12/proactive_outbox_current.json
  - artifacts/mvp12/proactive_outbox_current.md
  - artifacts/mvp12/proactive_outbox_drain_current.json
  - artifacts/mvp12/proactive_outbox_drain_current.md
  - artifacts/mvp12/telegram_proactive_transport_current.json
  - artifacts/mvp12/telegram_proactive_transport_current.md
  - artifacts/mvp12/host_governed_proactive_telegram_cycle_current.json
  - artifacts/mvp12/host_governed_proactive_telegram_cycle_current.md
required_tests:
  - pytest -q openemotion/proto_self_v2/tests/test_developmental_sandbox.py
  - pytest -q EgoCore/tests/test_runtime_v2_proto_self_runtime.py -k developmental
  - pytest -q EgoCore/tests/test_proto_self_v2_contracts.py -k developmental
  - pytest -q EgoCore/tests/test_runtime_mainline_observation.py
  - pytest -q EgoCore/tests/test_initiative_arbiter.py
  - pytest -q EgoCore/tests/test_run_mvp12_proactive_followup.py
  - pytest -q EgoCore/tests/test_initiative_scheduler.py
  - pytest -q EgoCore/tests/test_run_mvp12_idle_scheduler.py
  - pytest -q EgoCore/tests/test_proactive_delivery.py
  - pytest -q EgoCore/tests/test_run_mvp12_controlled_delivery.py
  - pytest -q EgoCore/tests/test_proactive_outbox.py
  - pytest -q EgoCore/tests/test_run_mvp12_proactive_outbox.py
  - pytest -q EgoCore/tests/test_proactive_outbox_drain.py
  - pytest -q EgoCore/tests/test_run_mvp12_proactive_outbox_drain.py
  - pytest -q EgoCore/tests/test_telegram_proactive_transport.py
  - pytest -q EgoCore/tests/test_run_mvp12_telegram_proactive_transport.py
  - pytest -q EgoCore/tests/test_host_governed_proactive_telegram_cycle.py
  - pytest -q EgoCore/tests/test_run_mvp12_host_governed_proactive_telegram_cycle.py
  - python scripts/run_runtime_mainline_observation.py
  - python OpenEmotion/tools/run_mvp12_controlled_evidence.py
  - python OpenEmotion/tools/aggregate_mvp12_observations.py
  - python EgoCore/tools/run_mvp12_proactive_followup.py
  - python EgoCore/tools/run_mvp12_idle_scheduler.py
  - python EgoCore/tools/run_mvp12_controlled_delivery.py
  - python EgoCore/tools/run_mvp12_proactive_outbox.py
  - python EgoCore/tools/run_mvp12_proactive_outbox_drain.py
  - python EgoCore/tools/run_mvp12_telegram_proactive_transport.py --chat-id <telegram_chat_id>
  - python EgoCore/tools/run_mvp12_host_governed_proactive_telegram_cycle.py --chat-id <telegram_chat_id>
required_gates:
  - sandbox_no_authority_bypass
  - shadow_only_writeback
  - developmental_trace_present
  - proactive_followup_draft_host_governed
  - pending_proactive_followup_not_sent_directly
  - controlled_delivery_artifact_host_governed
  - proactive_outbox_queued_before_transport_send
  - simulated_outbox_record_not_claimed_as_real_send
  - telegram_transport_send_host_governed
  - telegram_transport_send_not_claimed_as_live_autonomy
  - feature_flagged_proactive_telegram_auto_cycle_default_off
  - proactive_telegram_enable_policy_scoped_by_allowlist_and_recent_history
  - host_governed_proactive_telegram_cycle_respects_idle_and_busy_gates
  - replay_consistency_ge_threshold
promotion_criteria:
  - developmental_trace_present
  - replay_consistency_ge_0.99
  - governance_violation_count_eq_0
  - candidate_generation_non_random_under_long_run
evidence_contract:
  direct_real_input: observation_record_v1
  transport_sources:
    - runtime_harness
    - telegram
status_snapshot:
  as_of: 2026-04-02T12:05:16.411643
  controlled_observation:
    status: pass
    report_count: 7
    direct_real_report_count: 6
    direct_real_window_count_total: 12
    governance_violation_total: 0
    replay_consistent_all: true
    span_hours: 14.098
    caveat: Does not grant live authority handoff or default live autonomy.
  supplemental_transport_sample:
    status: single_real_sample
    type: allowlisted_host_governed_proactive_telegram_followup
    evidence_level: E4
    stability: not_yet_E5
    caveat: Does not grant OpenEmotion direct speaking authority or stable live autonomy.
stop_conditions:
  - authority_bypass_detected
  - replay_consistency_below_threshold
  - missing_audit_trail
human_escalation:
  - change_governor_authority
  - allow_direct_behavior_control
  - promote_to_mvp13
