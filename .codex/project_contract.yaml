version: 1

project:
  name: EGO
  repo: pen364692088/EGO
  default_branch: main

github_project:
  owner: pen364692088
  number: 1
  status_field: Status

verify_profiles:
  autopilot_target:
    commands:
      - label: autopilot_py_compile
        command:
          - python3
          - -m
          - py_compile
          - scripts/codex_project_autopilot.py
          - scripts/github_project_task.py
          - scripts/ego_operator_devloop.py
          - scripts/validate_experience_eval_contract.py
          - scripts/run_ego_experience_trial.py
          - scripts/import_human_observation_comments.py
          - EgoOperator/agent_base.py
          - EgoOperator/memory_system.py
          - EgoOperator/primitives/initiative.py
          - EgoOperator/primitives/subject_context.py
      - label: autopilot_tests
        command:
          - python3
          - -m
          - pytest
          - -q
          - scripts/tests/test_codex_project_autopilot.py
        env:
          TMPDIR: /tmp
  autopilot_full:
    commands:
      - label: script_tests
        command:
          - python3
          - -m
          - pytest
          - -q
          - scripts/tests/test_github_project_task.py
          - scripts/tests/test_ego_operator_devloop.py
          - scripts/tests/test_codex_project_autopilot.py
          - scripts/tests/test_experience_eval_contract.py
          - scripts/tests/test_run_ego_experience_trial.py
          - scripts/tests/test_import_human_observation_comments.py
          - EgoOperator/tests/test_memory_system.py
          - EgoOperator/tests/test_extracted_primitives.py
          - EgoOperator/tests/test_operator_runtime_contract.py
        env:
          TMPDIR: /tmp
      - label: diff_check
        command:
          - git
          - diff
          - --check
          - --
          - .codex
          - .agents/skills/codex-project-autopilot
          - AGENTS.md
          - scripts
          - scripts/tests
          - docs/codex/tasks/codex-cross-project-devloop-toolkit-v1
          - docs/codex/tasks/codex-autopilot-l2-dirty-baseline-v1
          - docs/codex/tasks/codex-autopilot-l3-l4-v2
          - docs/codex/tasks/ego-experience-roadmap-bootstrap-v1
          - EgoOperator

protected_paths:
  - legacy/ego-pre-handmade-mainline/
  - docs/PROGRAM_STATE_UNIFIED.yaml
  - artifacts/evidence_ledger/

allowed_mutation_paths:
  - .codex/project_contract.yaml
  - .codex/autopilot/
  - .agents/skills/codex-project-autopilot/
  - AGENTS.md
  - scripts/
  - scripts/tests/
  - EgoOperator/
  - docs/codex/tasks/codex-cross-project-devloop-toolkit-v1/
  - docs/codex/tasks/codex-autopilot-l2-dirty-baseline-v1/
  - docs/codex/tasks/codex-autopilot-l3-l4-v2/
  - docs/codex/tasks/ego-experience-roadmap-bootstrap-v1/

commit_policy:
  mode: direct-main
  push: true
  require_scoped_staging: true

task_classification:
  ready_project_statuses:
    - In Progress
    - Todo
  ready_title_prefixes:
    - "Codex Toolkit:"
    - "EgoOperator:"
    - "EgoRoadmap:"
  epic_title_prefixes:
    - "Epic "
  research_title_prefixes:
    - "Research:"
  ready_body_markers:
    - "Acceptance gate"
    - "Claim ceiling"
    - "Rollback"
  supporting_title_prefixes:
    - "Supporting:"
    - "Supporting Done:"
  parked_title_prefixes:
    - "Parked:"
  aggregate_title_contains:
    - "backlog"
    - "trial observation review"
    - "task board bootstrap"
  human_required_title_contains:
    - "human operator trial"
    - "human trial"
    - "real-provider human"
    - "scheduled dry-run patrol"
  high_impact_title_contains:
    - "program state"
    - "evidence ledger"
    - "mainline demotion"
    - "memory promotion"

auto_closeout:
  default_observation_class: deterministic_local
  done_status: Done
  observation_verify_profiles:
    deterministic_local: autopilot_full
    scripted_real_entry: autopilot_full
    scripted_with_llm_judge: autopilot_full
  llm_review_observation_classes:
    - scripted_with_llm_judge
  hard_stop_classes:
    - human_required
    - aggregate
    - parked
    - supporting
    - unknown
    - high_impact
    - blocked
  hard_stop_title_contains:
    - "program state"
    - "evidence ledger"
    - "mainline demotion"
    - "memory promotion"
    - "permissions expansion"
    - "permission expansion"
    - "stage card"
  hard_stop_body_markers:
    - "requires stage card"
    - "stage card required"
    - "modifies docs/PROGRAM_STATE_UNIFIED.yaml"
    - "touches docs/PROGRAM_STATE_UNIFIED.yaml"
    - "modifies artifacts/evidence_ledger"
    - "touches artifacts/evidence_ledger"
    - "permission expansion required"
    - "memory promotion required"
  claim_ceiling: Codex autopilot verified closeout local workflow candidate pass

auto_execute:
  require_project_status: In Progress
  allowed_observation_classes:
    - deterministic_local
    - scripted_real_entry
  blocked_observation_classes:
    - scripted_with_llm_judge
    - human_required
    - aggregate
    - parked
    - supporting
    - unknown
    - high_impact
  observation_verify_profiles:
    deterministic_local: autopilot_full
    scripted_real_entry: autopilot_full
  hard_stop_classes:
    - human_required
    - aggregate
    - parked
    - supporting
    - unknown
    - high_impact
    - blocked
  hard_stop_title_contains:
    - "program state"
    - "evidence ledger"
    - "mainline demotion"
    - "memory promotion"
    - "permissions expansion"
    - "permission expansion"
    - "stage card"
  hard_stop_body_markers:
    - "requires stage card"
    - "stage card required"
    - "modifies docs/PROGRAM_STATE_UNIFIED.yaml"
    - "touches docs/PROGRAM_STATE_UNIFIED.yaml"
    - "modifies artifacts/evidence_ledger"
    - "touches artifacts/evidence_ledger"
    - "permission expansion required"
    - "memory promotion required"
  claim_ceiling: Codex autopilot ready-issue executor gate local candidate pass

auto_pause:
  enabled: true
  recent_report_limit: 8
  repeated_failure_threshold: 3
  repeated_issue_threshold: 3
  pausing_stop_reasons:
    - dirty_worktree_unsafe
    - dirty_scope_unsafe
    - closeout_not_eligible
    - issue_not_ready
    - no_ready_issue
    - l5_execute_not_implemented

observation_classes:
  deterministic_local:
    closeout_allowed: true
    description: Unit tests or local deterministic scripts provide a direct oracle.
  scripted_real_entry:
    closeout_allowed: true
    description: The same user-facing entrypoint can be scripted and judged deterministically.
  scripted_with_llm_judge:
    closeout_allowed: false
    description: Batchable but still needs weaker claim ceiling or human review for subjective quality.
  human_required:
    closeout_allowed: false
    description: Requires human preference, external account observation, or high-impact route decision.
