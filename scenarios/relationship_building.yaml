      event:
        type: "assistant_reply"
        actor: "assistant"
        target: "user_builder"
        text: "Of course! What do you need?"
        
    - turn_id: 4
      phase: "early"
      event:
        type: "user_message"
        actor: "user_builder"
        target: "assistant"
        text: "Thanks for being helpful."
      expected_emotions:
        valence_min: 0.0
        valence_max: 0.15
        
    - turn_id: 5
      phase: "early"
      event:
        type: "world_event"
        actor: "user_builder"
        target: "assistant"
        meta:
          subtype: "care"
          source: "system"
      expected_relationship:
        bond_min: 0.05
        bond_max: 0.2
        
