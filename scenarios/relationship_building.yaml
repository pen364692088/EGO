# Gradual Relationship Building Tests
# Tests how relationships develop over extended interactions

metadata:
  name: "gradual_relationship_building"
  version: "1.0"
  description: "Extended interaction sequence testing relationship development"
  category: "relationship_development"
  target_count: 1
  turns_count: 50

targets:
  - target_id: "user_builder"
    initial_relationship:
      bond: 0.0
      grudge: 0.0
      trust: 0.3
      repair_bank: 0.0

