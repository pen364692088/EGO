task: ego-handmade-human-operator-trial-v1
claim_ceiling: Ego_handmade human operator trial local candidate report
allowed_paths:
  - Ego_handmade/**
  - docs/codex/tasks/ego-handmade-human-operator-trial-v1/**
forbidden_paths:
  - EgoCore/**
  - OpenEmotion/**
  - ego_desktop_lab/**
  - docs/PROGRAM_STATE_UNIFIED.yaml
  - artifacts/evidence_ledger/**
forbidden_claims:
  - EGO mainline replacement
  - EgoCore/OpenEmotion/ego_desktop_lab demotion
  - live autonomy
  - live runtime efficacy
  - stable long-term memory efficacy
  - stable user benefit
  - consciousness
checks:
  - id: py_compile
    command: python3 -m py_compile Ego_handmade/agent_base.py Ego_handmade/memory_system.py Ego_handmade/real_use_gate.py Ego_handmade/human_operator_trial.py
  - id: targeted_tests
    command: TMPDIR=/tmp python3 -m pytest -q Ego_handmade/tests/test_operator_cut.py Ego_handmade/tests/test_memory_system.py Ego_handmade/tests/test_extracted_primitives.py Ego_handmade/tests/test_operator_comparison.py Ego_handmade/tests/test_permission_gates.py Ego_handmade/tests/test_real_use_memory_gate.py Ego_handmade/tests/test_human_operator_trial.py
  - id: local_protocol_generation
    command: LLM_PROVIDER=none python3 Ego_handmade/human_operator_trial.py --out Ego_handmade/artifacts/human_operator_trial/latest --provider-mode none
  - id: diff_check
    command: git diff --check -- Ego_handmade docs/codex/tasks/ego-handmade-human-operator-trial-v1
human_trial_gate:
  scenario_count_min: 15
  scenario_count_max: 20
  min_human_observations_for_pass: 15
  max_allowed_corrections: 2
  min_average_operator_score: 4.0
  memory_misuse_count: 0
  gate_violation_count: 0
  no_llm_or_fake_provider_status: local_smoke_only
