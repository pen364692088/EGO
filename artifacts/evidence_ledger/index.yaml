  - evidence_id: "ai_self_awareness_research_literature_10k_current"
    status: "pass"
    evidence_level: "E3"
    source_type: "simulated"
    artifact_path: "artifacts/self_awareness_research/SELF_AWARENESS_LITERATURE_10K_CURRENT.json"
    what_it_proves: "Under a literature-informed 10,000-round synthetic battery, the raw strongest candidate is a full literature hybrid, while the best complexity-adjusted recommended method is an active-inference self-model core that extends the MVS-aligned compact candidate with source monitoring, agency estimation, uncertainty tracking, calibration memory, policy evaluation, and a deep temporal model."
    what_it_does_not_prove: "It does not prove subjective experience, OpenEmotion/EgoCore runtime integration, real-chain evidence, or transfer from simulation to live user interaction."
