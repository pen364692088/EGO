  - evidence_id: "ai_self_awareness_research_mvs_replay_gate_current"
    status: "fail"
    evidence_level: "E3"
    source_type: "observation"
    artifact_path: "artifacts/self_awareness_research/MVS_REPLAY_VALIDATOR_SCORED_CURRENT.json"
    what_it_proves: "A shadow-only formal MVS-aligned compact slice now runs against a canonical 60-episode held-out replay corpus on the formal OpenEmotion path. Under the corrected scored gate it strongly improves T1/T2/T3/T5 and passes all frozen ablation-necessity checks, but it still fails the frozen replay gate because T4 tension causality remains below threshold and repair_closure_capture stays at 0.75; by the frozen selection rule, the repo must switch the build-first lane to active-inference."
    what_it_does_not_prove: "It does not prove that the MVS failure is a fundamental theory limit, that any candidate has runtime efficacy on the formal mainline, that live user benefit exists, or that consciousness-like properties have been demonstrated."
    related_workstream: "ai_self_awareness_research"
    created_at: "2026-04-11T00:00:00Z"
    created_from_commit: "not_recorded_in_artifact"
  - evidence_id: "ai_self_awareness_research_active_inference_replay_gate_current"
    status: "pass"
    evidence_level: "E3"
    source_type: "observation"
    artifact_path: "artifacts/self_awareness_research/MVS_REPLAY_VALIDATOR_SCORED_CURRENT.json"
    what_it_proves: "A shadow-only formal active-inference self-model slice now runs against the same canonical 60-episode held-out replay corpus on the formal OpenEmotion path. Under the corrected ceiling-aware scored gate, it passes T1-T5, composite, boundary_integrity, repair_closure_capture, and trace_replayability, so the same frozen selection rule now yields a replay-validated shadow-only winner and keeps active-inference as the sole build-first candidate."
    what_it_does_not_prove: "It does not prove runtime efficacy on the formal mainline, replayed-conversation transfer, live user benefit, unrestricted authority, or consciousness-like properties."
