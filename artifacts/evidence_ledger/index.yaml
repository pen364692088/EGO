    evidence_level: "E2"
    source_type: "doc"
    artifact_path: "docs/codex/tasks/ai-self-awareness-minimal-framework/CONTROLLED_INTEGRATION_PLAN.md"
    what_it_proves: "The repo now freezes a bounded controlled integration plan for the replay-validated active-inference winner. The host-consumable surface is explicitly limited to policy_hint, response_tendency, and trace_payload; candidate-private action maps remain OpenEmotion-internal; and the first bridge is fixed to replayed conversations / repo-authored conversation slices with authority drift held at zero."
    what_it_does_not_prove: "It does not prove that the bridge implementation works, that replayed conversations still pass the frozen gate, that runtime efficacy exists on the formal mainline, or that any consciousness-like property has been demonstrated."
